<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBT Trece Martires → PNG Tool</title>

  <style>
    @font-face {
      font-family: 'BBT Trece Martires';
      src: url('./fonts/BBTMartiresFree-Thin.otf') format('opentype');
      font-weight: 100;
      font-style: normal;
    }
    @font-face {
      font-family: 'BBT Trece Martires';
      src: url('./fonts/BBTMartiresFree-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'BBT Trece Martires';
      src: url('./fonts/BBTMartiresFree-ExtraBold.otf') format('opentype');
      font-weight: 800;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f3ed;
      color: #3d3028;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 24px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .controls {
      background: #fff;
      border: 1px solid #d4c5b0;
      border-radius: 8px;
      padding: 20px 24px;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a6050;
    }

    input[type="text"], textarea, input[type="number"] {
      border: 1px solid #c8b89a;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      color: #3d3028;
      background: #faf8f3;
    }

    input[type="text"]:focus, textarea:focus, input[type="number"]:focus {
      outline: 2px solid #9a6134;
      border-color: transparent;
    }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 80px;
      font-family: system-ui, sans-serif;
    }

    input[type="color"] {
      border: 1px solid #c8b89a;
      border-radius: 4px;
      width: 44px;
      height: 34px;
      padding: 2px;
      cursor: pointer;
      background: #faf8f3;
    }

    input[type="number"] {
      width: 80px;
    }

    select {
      border: 1px solid #c8b89a;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      color: #3d3028;
      background: #faf8f3;
      cursor: pointer;
    }

    .preview-wrapper {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border: 1px solid #d4c5b0;
      border-radius: 8px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .preview-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a6050;
    }

    /* The element that gets captured */
    #canvas-target {
      display: inline-block;
      padding: 16px 20px;
      font-family: 'BBT Trece Martires', serif;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.3;
      /* defaults — overridden by JS */
      font-size: 48px;
      color: #3d3028;
      background: transparent;
    }

    .preview-bg-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a6050;
    }

    #preview-bg {
      background: #faf8f3;
      border: 1px solid #d4c5b0;
      border-radius: 6px;
      padding: 8px;
      min-height: 80px;
      display: flex;
      align-items: center;
      overflow: auto;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #btn-save {
      background: #3d3028;
      color: #faf8f3;
    }

    #btn-copy {
      background: #9a6134;
      color: #fff;
    }

    .tip {
      font-size: 11px;
      color: #9a7c68;
      line-height: 1.5;
    }

    .font-warning {
      background: #fff8e7;
      border: 1px solid #e0c96b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #6b5a00;
      line-height: 1.6;
      max-width: 680px;
      width: 100%;
    }
  </style>
</head>
<body>

  <h1>BBT Trece Martires &rarr; PNG</h1>

  <div class="font-warning" id="font-status">
    Checking if font loaded&hellip; (if text below shows in your custom font, you're good to go)
  </div>

  <!-- Controls -->
  <div class="controls">
    <label>
      Text
      <textarea id="input-text" placeholder="Type your text here&hellip;">Dan &amp; Jane</textarea>
    </label>

    <div class="row">
      <label>
        Font Size (px)
        <input type="number" id="font-size" value="72" min="8" max="400">
      </label>
      <label>
        Text Color
        <input type="color" id="text-color" value="#3d3028">
      </label>
      <label>
        Background
        <input type="color" id="bg-color" value="#faf8f3">
      </label>
      <label>
        Background
        <select id="bg-type">
          <option value="color">Solid color</option>
          <option value="transparent">Transparent</option>
        </select>
      </label>
      <label>
        Weight
        <select id="font-weight">
          <option value="400">Regular</option>
          <option value="100">Thin</option>
          <option value="800">Extra Bold</option>
        </select>
      </label>
      <label>
        Align
        <select id="text-align">
          <option value="center">Center</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
        </select>
      </label>
      <label>
        Padding (px)
        <input type="number" id="padding" value="16" min="0" max="200">
      </label>
      <label>
        Min Width (px)
        <input type="number" id="min-width" value="0" min="0" max="2000">
      </label>
    </div>

    <p class="tip">
      Tip: For email use, aim for a width around 544–600 px. Set Min Width and adjust font size to taste.
    </p>
  </div>

  <!-- Preview -->
  <div class="preview-wrapper">
    <span class="preview-label">Preview</span>
    <div id="preview-bg">
      <div id="canvas-target">Dan &amp; Jane</div>
    </div>
    <div class="actions">
      <button id="btn-save">&#8595; Save as PNG</button>
      <button id="btn-copy">Copy to Clipboard</button>
    </div>
  </div>

  <!-- html2canvas from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
          integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    const inputText  = document.getElementById('input-text');
    const fontSize   = document.getElementById('font-size');
    const fontWeight = document.getElementById('font-weight');
    const textColor  = document.getElementById('text-color');
    const bgColor    = document.getElementById('bg-color');
    const bgType     = document.getElementById('bg-type');
    const textAlign  = document.getElementById('text-align');
    const padding    = document.getElementById('padding');
    const minWidth   = document.getElementById('min-width');
    const target     = document.getElementById('canvas-target');
    const previewBg  = document.getElementById('preview-bg');
    const fontStatus = document.getElementById('font-status');

    // Check font load
    document.fonts.ready.then(() => {
      const loaded = [...document.fonts].some(f =>
        f.family.includes('BBT') && f.status === 'loaded'
      );
      if (loaded) {
        fontStatus.style.background = '#e8f5e9';
        fontStatus.style.borderColor = '#81c784';
        fontStatus.style.color = '#1b5e20';
        fontStatus.textContent = '✓ BBT Trece Martires font loaded successfully.';
      } else {
        fontStatus.style.background = '#fff3e0';
        fontStatus.style.borderColor = '#ffb74d';
        fontStatus.style.color = '#7c3e00';
        fontStatus.innerHTML =
          '⚠ Font not found. Open this file in a text editor and update the <code>@font-face src:</code> paths ' +
          'to point to your BBT Trece Martires font file (.ttf / .otf / .woff).';
      }
    });

    function updatePreview() {
      const text = inputText.value;
      target.textContent = text;
      target.style.fontSize  = fontSize.value + 'px';
      target.style.fontWeight = fontWeight.value;
      target.style.color     = textColor.value;
      target.style.textAlign = textAlign.value;
      target.style.padding   = padding.value + 'px';
      target.style.minWidth  = minWidth.value > 0 ? minWidth.value + 'px' : '';

      const transparent = bgType.value === 'transparent';
      const bg = transparent ? 'transparent' : bgColor.value;
      target.style.background  = bg;
      previewBg.style.background = transparent ? 'repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 0 0 / 16px 16px' : bgColor.value;
    }

    // Wire up all controls
    [inputText, fontSize, fontWeight, textColor, bgColor, bgType, textAlign, padding, minWidth]
      .forEach(el => el.addEventListener('input', updatePreview));

    bgType.addEventListener('change', () => {
      bgColor.disabled = bgType.value === 'transparent';
      updatePreview();
    });

    updatePreview();

    // --- Save as PNG ---
    async function renderToPng() {
      const transparent = bgType.value === 'transparent';
      const canvas = await html2canvas(target, {
        backgroundColor: transparent ? null : bgColor.value,
        scale: 2,         // 2× for crisp retina-quality output
        useCORS: true,
        logging: false,
      });
      return canvas;
    }

    document.getElementById('btn-save').addEventListener('click', async () => {
      const canvas = await renderToPng();
      const link = document.createElement('a');
      link.download = 'bbt-text.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    document.getElementById('btn-copy').addEventListener('click', async () => {
      try {
        const canvas = await renderToPng();
        canvas.toBlob(async blob => {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          const btn = document.getElementById('btn-copy');
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = orig, 1500);
        });
      } catch (e) {
        alert('Copy to clipboard failed: ' + e.message);
      }
    });
  </script>

</body>
</html>
